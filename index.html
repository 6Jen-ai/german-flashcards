<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German-English Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .duration-600 { transition-duration: 600ms; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col antialiased relative">
    <!-- Header -->
    <header class="bg-white shadow-sm p-4 sticky top-0 z-20">
        <div class="max-w-2xl mx-auto flex items-center justify-between mb-4">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="languages"></i> German Flashcards
            </h1>
            <button id="settingsBtn" class="p-2 text-slate-500 hover:text-slate-800 rounded-full hover:bg-slate-100 transition-colors">
                <i data-lucide="settings"></i>
                <span class="sr-only">Settings</span>
            </button>
        </div>
        <!-- Progress Bar -->
        <div class="max-w-2xl mx-auto flex items-center gap-4">
            <span class="text-sm font-medium w-12 text-right" id="progressText">0%</span>
            <div class="flex-1 bg-slate-200 rounded-full h-2.5 overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="hidden absolute top-20 right-4 md:right-auto md:left-1/2 md:-translate-x-1/2 bg-white shadow-xl rounded-xl p-6 border border-slate-100 z-30 w-80">
        <h3 class="font-bold text-lg mb-4">Settings</h3>
        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 mb-1">CSV Data URL</label>
            <input type="text" id="csvUrlInput" class="w-full text-sm p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Google Sheet published as CSV">
            <p class="text-xs text-slate-500 mt-1">Leave blank to use sample dataset.</p>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 mb-1">Words per Section</label>
            <input type="number" id="wpsInput" min="1" max="100" value="10" class="w-full text-sm p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button id="saveSettingsBtn" class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700 transition-colors">Apply & Reload</button>
        <button id="resetDataBtn" class="w-full bg-slate-100 text-slate-700 py-2 rounded font-medium hover:bg-slate-200 transition-colors mt-2 text-sm">Reset Progress</button>
    </div>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
        <div id="messageBox" class="text-sm rounded p-3 mb-4 hidden max-w-2xl w-full text-center"></div>

        <!-- Section Header -->
        <div class="w-full max-w-[400px] flex justify-between items-center mb-6 mt-2">
            <h2 id="sectionTitle" class="font-semibold text-lg text-slate-700">Section 1</h2>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="sectionComplete" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 cursor-pointer">
                <label for="sectionComplete" class="text-sm font-medium text-slate-600 cursor-pointer select-none">Completed</label>
            </div>
        </div>
        
        <div class="w-full max-w-[400px] mb-2 text-center text-sm font-medium text-slate-500">
            Card <span id="cardIndex">1/10</span>
        </div>

        <!-- Flashcard -->
        <div class="w-[80%] max-w-[400px] aspect-[4/3] perspective-1000 cursor-pointer group mb-8 select-none" id="flashcard">
            <div id="flashcardInner" class="relative w-full h-full duration-600 transform-style-3d shadow-lg rounded-2xl group-hover:shadow-xl transition-shadow">
                <!-- Front (German) -->
                <div class="absolute w-full h-full backface-hidden bg-white border border-slate-200 rounded-2xl flex flex-col items-center justify-center p-6 text-center">
                    <button class="audioBtn absolute top-4 right-4 p-3 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-full transition-colors z-10 focus:outline-none" aria-label="Play Audio">
                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                    </button>
                    <div class="text-sm font-medium text-slate-400 mb-2 uppercase tracking-wider">German</div>
                    <div id="frontText" class="text-3xl md:text-4xl font-bold text-slate-800 break-words w-full px-4">Loading...</div>
                    <div class="absolute bottom-4 text-xs text-slate-400 font-medium hidden md:block">Tap to flip • Space</div>
                </div>
                <!-- Back (English) -->
                <div class="absolute w-full h-full backface-hidden bg-blue-50 border border-blue-100 rounded-2xl flex flex-col items-center justify-center p-6 text-center rotate-y-180">
                    <button class="audioBtn absolute top-4 right-4 p-3 text-blue-500 hover:text-blue-700 hover:bg-blue-100 rounded-full transition-colors z-10 focus:outline-none" aria-label="Play Audio">
                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                    </button>
                    <div class="text-sm font-medium text-blue-400 mb-2 uppercase tracking-wider">English</div>
                    <div id="backText" class="text-3xl md:text-4xl font-bold text-slate-800 break-words w-full px-4">...</div>
                    <div class="absolute bottom-4 text-xs text-slate-400 font-medium hidden md:block">Tap to flip back • Space</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="w-full max-w-[400px] flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-slate-100">
            <button id="prevBtn" class="px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg flex items-center justify-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="chevron-left" class="w-5 h-5"></i> <span class="hidden md:inline">Previous</span>
            </button>
            <button id="nextBtn" class="px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg flex items-center justify-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <span class="hidden md:inline">Next</span> <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </main>

    <!-- Footer Selector (Scrollable horizontally) -->
    <footer class="bg-white border-t border-slate-200 p-4">
        <div class="max-w-2xl mx-auto">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Sections</p>
            <div id="sectionGrid" class="flex overflow-x-auto gap-2 pb-2 no-scrollbar"></div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const App = {
            data: [], wordsPerSection: 10, sections: [], 
            curSectionIdx: 0, curCardIdx: 0, isFlipped: false, 
            completed: [], url: ''
        };
        const el = {
            progress: document.getElementById('progressBar'),
            progText: document.getElementById('progressText'),
            settingsPanel: document.getElementById('settingsPanel'),
            csvUrl: document.getElementById('csvUrlInput'),
            wps: document.getElementById('wpsInput'),
            msg: document.getElementById('messageBox'),
            secTitle: document.getElementById('sectionTitle'),
            secCheck: document.getElementById('sectionComplete'),
            cardIdx: document.getElementById('cardIndex'),
            flashcard: document.getElementById('flashcard'),
            inner: document.getElementById('flashcardInner'),
            front: document.getElementById('frontText'),
            back: document.getElementById('backText'),
            prev: document.getElementById('prevBtn'),
            next: document.getElementById('nextBtn'),
            grid: document.getElementById('sectionGrid')
        };
        const fbData = "german,english\nHallo,Hello\nTschüss,Goodbye\nBitte,Please\nDanke,Thank you\nJa,Yes\nNein,No\nEins,One\nZwei,Two\nDrei,Three\nVier,Four\nFünf,Five\nSechs,Six\nSieben,Seven\nAcht,Eight\nNeun,Nine\nZehn,Ten\nGuten Morgen,Good morning\nGuten Abend,Good evening\nEs tut mir leid,I am sorry\nIch heiße...,My name is...\nWie geht es dir?,How are you?";

        function loadStorage() {
            try {
                const s = JSON.parse(localStorage.getItem('fcSettings'));
                if(s) { App.wps = s.wps||10; App.url = s.url||''; App.completed = s.completed||[]; }
            } catch(e){}
            el.wps.value = App.wps; el.csvUrl.value = App.url;
        }
        function saveStorage() {
            localStorage.setItem('fcSettings', JSON.stringify({wps: App.wps, url: App.url, completed: App.completed}));
        }
        function showMsg(m, err=false) {
            el.msg.textContent = m;
            el.msg.className = `text-sm rounded p-3 mb-4 max-w-2xl w-full text-center ${err?'bg-red-50 text-red-600 border border-red-200':'bg-blue-50 text-blue-600 border border-blue-200'}`;
            el.msg.classList.remove('hidden');
        }
        function parseCSV(csv) {
            const rows = csv.split('\n').map(r => r.trim()).filter(r=>r);
            if(rows.length < 2) return;
            App.data = [];
            for(let i=1; i<rows.length; i++) {
                let r = rows[i], inQ = false, c1 = "", j=0;
                while(j < r.length) {
                    let c = r[j];
                    if(c==='"') inQ=!inQ;
                    else if(c===',' && !inQ) break;
                    else c1+=c;
                    j++;
                }
                if(j<r.length) {
                    let c2 = r.substring(j+1).trim();
                    if(c2.startsWith('"')) c2 = c2.substring(1, c2.length-1);
                    App.data.push({de: c1.trim(), en: c2.trim()});
                }
            }
        }
        async function init() {
            loadStorage(); await fetchData();
            if(App.data.length>0) {
                buildSections(); jumpStart(); updateUI();
            } else {
                showMsg('No valid data parsed.', true);
            }
        }
        async function fetchData() {
            let txt = fbData;
            el.msg.classList.add('hidden');
            if(App.url) {
                try { 
                    showMsg('Loading data...'); 
                    const r = await fetch(App.url); 
                    if(!r.ok) throw new Error("HTTP error " + r.status);
                    txt = await r.text(); 
                    el.msg.classList.add('hidden'); 
                    showMsg('Data loaded successfully!', false);
                    setTimeout(() => el.msg.classList.add('hidden'), 2000);
                }
                catch(e) { 
                    console.error("Fetch error:", e);
                    showMsg('Sheet not found or network error. Using sample.', true); 
                    txt = fbData; 
                }
            } else {
                showMsg('Using sample dataset. Configure CSV URL in settings.', false);
                setTimeout(() => el.msg.classList.add('hidden'), 3000);
            }
            parseCSV(txt);
        }
        function buildSections() {
            App.sections = []; 
            const L = App.data.length; 
            let w = parseInt(App.wps)||10; 
            if(w < 1) w = 10;
            App.wps = w;
            for(let i=0; i<L; i+=w) App.sections.push({start: i, end: Math.min(i+w-1, L-1)});
            App.completed = App.completed.filter(i => i < App.sections.length); 
            saveStorage();
        }
        function jumpStart() {
            App.curSectionIdx = App.sections.findIndex((_,i)=>!App.completed.includes(i));
            if(App.curSectionIdx===-1) App.curSectionIdx=0;
            if(App.sections.length > 0) App.curCardIdx = App.sections[App.curSectionIdx].start;
        }
        function updateUI() {
            if (App.sections.length === 0) return;
            const s = App.sections[App.curSectionIdx], total = s.end-s.start+1, rel = App.curCardIdx-s.start;
            const w = App.data[App.curCardIdx];
            if(App.isFlipped) {
                App.isFlipped=false;
                el.inner.classList.remove('rotate-y-180');
            }
            el.front.textContent = w.de; el.back.textContent = w.en;
            el.cardIdx.textContent = `${rel+1}/${total}`;
            el.secTitle.textContent = `Section ${App.curSectionIdx+1}`;
            el.prev.disabled = rel===0; el.next.disabled = rel===total-1;
            el.secCheck.checked = App.completed.includes(App.curSectionIdx);
            
            const pct = App.sections.length? Math.round((App.completed.length/App.sections.length)*100):0;
            el.progress.style.width = pct+'%'; el.progText.textContent = pct+'%';
            renderGrid();
        }
        function renderGrid() {
            el.grid.innerHTML = '';
            App.sections.forEach((_, i) => {
                const comp = App.completed.includes(i), act = i===App.curSectionIdx;
                const b = document.createElement('button');
                b.className = `min-w-[4rem] px-3 py-2 rounded-lg text-sm font-medium transition-colors border flex flex-col items-center gap-1 flex-shrink-0 ${act?'bg-blue-600 text-white border-blue-600 shadow-md':comp?'bg-green-50 text-green-700 border-green-200 outline outline-1 outline-green-200':'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`;
                b.innerHTML = `<span>${i+1}</span>${comp?('<i data-lucide="check" class="w-3 h-3 '+(act?'text-white':'')+ '"></i>'):''}`;
                b.onclick = () => { App.curSectionIdx = i; App.curCardIdx = App.sections[i].start; updateUI(); };
                el.grid.appendChild(b);
            });
            lucide.createIcons();
            // Automatically scroll the current section block into view
            setTimeout(()=> { 
                const c=el.grid.children[App.curSectionIdx]; 
                if(c) c.scrollIntoView({behavior:'smooth',inline:'center', block:'nearest'}); 
            }, 100);
        }
        function flip() { App.isFlipped=!App.isFlipped; el.inner.classList.toggle('rotate-y-180', App.isFlipped); scroll(0,0); }
        function play(e) {
            e.stopPropagation();
            const w = App.data[App.curCardIdx], txt = App.isFlipped?w.en:w.de, lang = App.isFlipped?'en-US':'de-DE';
            if(window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(txt); u.lang = lang;
                const v = window.speechSynthesis.getVoices().find(x=>x.lang.startsWith(lang.substring(0,2))&&x.name.includes('Natural'));
                if(v) u.voice = v;
                window.speechSynthesis.speak(u);
            }
        }
        el.flashcard.addEventListener('click', flip);
        document.querySelectorAll('.audioBtn').forEach(b => b.addEventListener('click', play));
        el.prev.addEventListener('click', () => { App.curCardIdx--; updateUI(); });
        el.next.addEventListener('click', () => { App.curCardIdx++; updateUI(); });
        el.secCheck.addEventListener('change', (e) => {
            if(e.target.checked) { if(!App.completed.includes(App.curSectionIdx)) App.completed.push(App.curSectionIdx); }
            else App.completed = App.completed.filter(i=>i!==App.curSectionIdx);
            saveStorage(); updateUI();
        });
        document.getElementById('settingsBtn').addEventListener('click', ()=>el.settingsPanel.classList.toggle('hidden'));
        document.getElementById('saveSettingsBtn').addEventListener('click', async ()=> {
            App.wps = parseInt(el.wps.value)||10; App.url = el.csvUrl.value.trim();
            el.settingsPanel.classList.add('hidden'); saveStorage();
            await fetchData(); buildSections(); jumpStart(); updateUI();
        });
        document.getElementById('resetDataBtn').addEventListener('click', () => {
             App.completed = [];
             saveStorage();
             jumpStart();
             updateUI();
             el.settingsPanel.classList.add('hidden');
        });
        window.addEventListener('keydown', e => {
            if(!el.settingsPanel.classList.contains('hidden')) return;
            if(e.code==='Space'||e.key===' ') { e.preventDefault(); flip(); }
            else if(e.code==='ArrowRight'&&!el.next.disabled) { e.preventDefault(); el.next.click(); }
            else if(e.code==='ArrowLeft'&&!el.prev.disabled) { e.preventDefault(); el.prev.click(); }
        });
        init();
        
        // Ensure voices are loaded so they are ready
        if (typeof window.speechSynthesis !== 'undefined' && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
